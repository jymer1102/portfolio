<!DOCTYPE html>

    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Connect | jymer1102">
    <meta name="twitter:description" content="Reach out via socials or send a direct message to jymer1102.">
    <meta name="twitter:image" content="https://jymer1102.github.io/jymer1102_website/images/social-card.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,500;8..60,600&display=swap" rel="stylesheet">
</head>
<body>

    <nav id="top">
        <a href="{{ '/' | relative_url }}#top" class="logo">jymer1102</a>
        <div class="nav-links">
            <a href="{{ '/' | relative_url }}">Home</a>
            <a href="{{ '/creations/' | relative_url }}">Creations</a>
            <a href="{{ '/connect/' | relative_url }}" class="active">Connect</a>
        </div>
    </nav>

    <header class="page-header" data-aos="fade-up" data-aos-duration="900">
        <p class="eyebrow">portfolio / connect</p>
        <h1 class="glow-text">Connect<span class="cursor">_</span></h1>
        <p class="subtitle">Reach out via socials or send a direct message.</p>
    </header>

    <main class="container">
        
        <section class="connect-section" data-aos="fade-up" data-aos-duration="900">
            <div class="connect-panel">
                <ul class="connect-list">
                    <li>
                        <span class="connect-label">Email</span>
                        <a href="mailto:contact@jymer1102.me" class="connect-value">contact@jymer1102.me</a>
                    </li>
                    <li>
                        <span class="connect-label">Phone</span>
                        <a href="tel:+1234567890" class="connect-value">+1 (234) 567-890</a>
                    </li>
                    <li>
                        <span class="connect-label">Linktree</span>
                        <a href="https://linktr.ee/jymer1102" target="_blank" rel="noopener noreferrer" class="connect-value">linktr.ee/jymer1102</a>
                    </li>
                </ul>
            </div>
        </section>

        <section class="contact-section" data-aos="fade-up" data-aos-duration="900" data-aos-delay="100">
            <div class="form-container">
                <form action="https://formspree.io/f/xlgqnkqn" method="POST">
                    
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" class="form-control" placeholder="Your Name" required>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="_replyto" class="form-control" placeholder="name@example.com" required>
                    </div>

                    <div class="form-group">
                        <label for="subject">Subject</label>
                        <select id="subject" name="subject" class="form-control">
                            <option value="General Inquiry">General Inquiry</option>
                            <option value="Project Proposal">Project Proposal</option>
                            <option value="Collaboration">Collaboration</option>
                            <option value="Just Saying Hi">Just Saying Hi</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" class="form-control" placeholder="Write your message here..." required></textarea>
                    </div>

                    <input type="hidden" name="_subject" value="New message from jymer1102.me!">

                    <button type="submit" class="submit-btn">Send Message</button>
                </form>
            </div>
        </section>

    </main>

    <footer>jymer1102 — built with care.</footer>

    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init({
            once: true,
            duration: 900,
            easing: 'ease-out-cubic'
        });
    </script>
    <script src="{{ '/favicon-animation.js' | relative_url }}"></script>
    
</body>
